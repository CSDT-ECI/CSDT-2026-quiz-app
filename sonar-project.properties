sonar.python.version=3.9,3.10,3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.organization=csdt-eci
sonar.projectKey=CSDT-ECI_CSDT-2026-quiz-app
sonar.sources=.
# Tests excluded from analysis; presentation assets (slide content, deck CSS,
# generated illustrations) are not application code. index.html stays in scope
# on purpose so future CDN/script-loading regressions are caught.
sonar.exclusions=tests/**,slides.md,assets/**,images/**
# CI helper; not executed by pytest — exclude from "Coverage on New Code"
sonar.coverage.exclusions=scripts/**
